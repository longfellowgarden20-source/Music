# Builds the Windows installer in the cloud — no Windows machine needed.
# Trigger it manually from the Actions tab, or on a version tag (v1.0.0).
# The .exe lands as a downloadable artifact / release asset.
name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle the engine (PyInstaller)
        run: python -m PyInstaller desktop/engine.spec --noconfirm --distpath desktop/engine_build

      - name: Stage engine binary
        shell: bash
        run: |
          mkdir -p desktop/engine
          cp -r desktop/engine_build/stemai-engine/* desktop/engine/

      - name: Build the UI
        run: |
          cd studio
          npm ci
          npm run build

      - name: Package the desktop app
        run: |
          cd desktop
          npm ci
          npm run pack:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: StemAI-Windows
          path: desktop/dist/*.exe
